name: Release on Version Change

on:
  push:
    branches:
      - main
    paths:
      - 'AssetSelfReport.ps1'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract script version
        id: get_version
        run: |
          VERSION=$(sed -n 's/.*\$ScriptVersion = "\([^"]*\)".*/\1/p' AssetSelfReport.ps1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.get_version.outputs.version }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release zip
        if: steps.check_release.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          zip "AssetSelfReport-v${VERSION}.zip" AssetSelfReport.ps1 README.md LICENSE

      - name: Publish GitHub release
        if: steps.check_release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          TAG="v${VERSION}"
          gh release create "$TAG" \
            "AssetSelfReport-v${VERSION}.zip" \
            --title "Release $TAG" \
            --notes "Automated release for script version ${VERSION}."
